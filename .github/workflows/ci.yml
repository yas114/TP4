name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest setuptools wheel
        pip install -e . || pip install .
    
    - name: Verify installation
      run: |
        python -c "import encoder; print('Encoder module imported successfully')"
        python -c "from encoder import main, convert, detect; print('Functions imported successfully')"
    
    - name: Run tests
      run: |
        python -m pytest test/ -v
    
    - name: Test CLI commands
      shell: bash
      run: |
        python -m encoder list
        echo "Hello World" > test_file.txt
        python -m encoder detect test_file.txt
        python -m encoder convert test_file.txt output.txt -f utf-8 -t utf-16
    
    - name: Test cross-platform encoding conversion
      shell: bash
      run: |
        echo "Testing cross-platform encoding conversion..."
        echo "Hello World Test" > test_input.txt
        python -m encoder convert test_input.txt test_output_utf16.txt -f utf-8 -t utf-16
        python -m encoder detect test_output_utf16.txt
        python -m encoder convert test_output_utf16.txt test_output_back.txt -f utf-16 -t utf-8
        echo "Cross-platform test completed"
